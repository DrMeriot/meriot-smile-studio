name: CI

# Filet de securite automatique. Tourne sur un runner Linux PROPRE (donc
# immunise contre les troncatures de fichiers cote OneDrive local) : si un
# fichier a ete corrompu/tronque, tsc ou build echoue ICI et le commit est
# marque rouge sur GitHub — au lieu de partir en "Error" silencieux sur Vercel.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript (doit etre 0 erreur)
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Lint
        run: npm run lint

      - name: Build SSG (le vrai vite-react-ssg build)
        run: npm run build

      - name: Tests (SEO / JSON-LD sur le HTML SSG)
        run: npm run test
